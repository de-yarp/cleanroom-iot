name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Export requirements.txt
        run: uv export --no-hashes -o requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Zip package
        run: zip -r deploy.zip . -x "*.git*" -x "antenv/*" -x "*.pyc" -x "__pycache__/*"

      - name: Deploy via zip deploy (triggers Oryx build)
        run: |
          az webapp deploy \
            --resource-group esp \
            --name esp-cleanroom \
            --src-path deploy.zip \
            --type zip \
            --async true
